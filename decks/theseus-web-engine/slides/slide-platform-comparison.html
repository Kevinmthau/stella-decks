<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="../../styles/deck.css">
<link rel="stylesheet" href="../theseus-web-engine.css">
</head>
<body>
<div class="slide rt-slide rt-matrix">
  <div class="rt-matrix__grid">
    <div class="rt-matrix__cell rt-matrix__cell--blank"></div>
    <div class="rt-matrix__cell"><div class="rt-badge rt-badge--custom"><span>CUSTOM</span></div></div>
    <div class="rt-matrix__cell"><div class="rt-badge rt-badge--apple"><span>M5<small>PRO</small></span></div></div>
    <div class="rt-matrix__cell"><div class="rt-badge rt-badge--snapdragon"><span><small>Snapdragon</small>X2<small>Elite</small></span></div></div>
    <div class="rt-matrix__cell"><div class="rt-badge rt-badge--mediatek"><span><small>MEDIATEK</small>NVIDIA</span></div></div>
    <div class="rt-matrix__cell"><div class="rt-badge rt-badge--amd"><span><small>AMD</small>RYZEN AI</span></div></div>
    <div class="rt-matrix__cell"><div class="rt-badge rt-badge--intel"><span><small>Series 3</small>intel<small>CORE ULTRA</small></span></div></div>

    <div class="rt-matrix__cell rt-matrix__row-label">Efficient GPU</div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--yes">✓</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--yes">✓</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--yes">✓</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--no">×</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--no">×</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--yes">✓</span></div>

    <div class="rt-matrix__cell rt-matrix__row-label">Native Hypervisor</div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--yes">✓</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--no">×</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--no">×</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--no">×</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--no">×</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--no">×</span></div>

    <div class="rt-matrix__cell rt-matrix__row-label">ISA Independence</div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--yes">✓</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--yes">✓</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--no">×</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--no">×</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--no">×</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--no">×</span></div>

    <div class="rt-matrix__cell rt-matrix__row-label">Unified Memory</div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--yes">✓</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--yes">✓</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--no">×</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--yes">✓</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--no">×</span></div>

    <div class="rt-matrix__cell rt-matrix__row-label">Linux Ready</div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--yes">✓</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--no">×</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--no">×</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--yes">✓</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--yes">✓</span></div>
    <div class="rt-matrix__cell"><span class="rt-status rt-status--yes">✓</span></div>

</html>
